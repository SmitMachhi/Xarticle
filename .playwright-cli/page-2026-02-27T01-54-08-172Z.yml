          - generic [ref=e132]:
            - heading "Post 1" [level=3] [ref=e133]
            - paragraph [ref=e134]: "The most underrated AI opportunity for startups: automating how companies talk to each other. Within a company, AI is making rapid progress. But across companies? The world still runs on emails, phone calls, PDFs, and FTP. A thread 🧵"
            - heading "Post 2" [level=3] [ref=e135]
            - paragraph [ref=e136]: Procurement example A procurement team emails a vendor. Vendor sends back a PDF quote. Someone manually enters it into an ERP. Approval goes out via email. PO gets generated. Another PDF. Every step - a human in the middle.
            - heading "Post 3" [level=3] [ref=e137]
            - paragraph [ref=e138]: "Food supply chain example Or how food gets to a restaurant: Restaurant calls a distributor. Distributor checks inventory over email with the warehouse. Warehouse coordinates with multiple next-level distributors over WhatsApp and phone calls. Invoices are PDFs. Delivery confirmations are text messages."
            - heading "Post 4" [level=3] [ref=e139]
            - paragraph [ref=e140]: Why hard Why has this barely been touched by AI? No shared systems - every company has its own stack No APIs between most businesses - the "API" is email and PDFs Trust and compliance - automating across boundaries requires a different level of verification
            - heading "Post 5" [level=3] [ref=e141]
            - paragraph [ref=e142]: Why is this valuable? Because this is where the most time and effort are wasted. Every manual handoff between companies is a delay, an error, and a cost. AI that can read, understand, and act on emails, voice calls, and documents across company boundaries - a massive unlock.
            - heading "Post 6" [level=3] [ref=e143]
            - paragraph [ref=e144]: "Portfolio examples We are already seeing this happen: @FinrepAI - automating reporting between the CFO office and SEC. @nanonets - deploying AI workflows at the edge of large orgs, spanning systems never designed to talk to each other"
            - heading "Post 7" [level=3] [ref=e145]
            - paragraph [ref=e146]: The companies solving this will not be building another internal copilot. They will be building the connective tissue of business. If you are pursuing such use cases with AI, I would love to hear about it.
